<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SysWatch — IT System Monitor</title>
  <style>
    :root {
      --bg: #0d1117;
      --surface: #161b22;
      --surface2: #1c2128;
      --border: #30363d;
      --text: #e6edf3;
      --muted: #7d8590;
      --accent: #2ea043;
      --accent-glow: rgba(46,160,67,0.15);
      --warn: #d29922;
      --danger: #da3633;
      --info: #1f6feb;
      --font: 'Courier New', monospace;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
      font-size: 13px;
      min-height: 100vh;
    }
    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 14px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .logo {
      font-size: 18px;
      font-weight: bold;
      color: var(--accent);
      letter-spacing: 2px;
    }
    .logo span { color: var(--muted); font-weight: normal; }
    .status-bar {
      display: flex;
      gap: 20px;
      align-items: center;
    }
    .dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; margin-right: 6px; }
    .dot.green { background: var(--accent); box-shadow: 0 0 6px var(--accent); animation: pulse 2s infinite; }
    .dot.yellow { background: var(--warn); }
    .dot.red { background: var(--danger); }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.5} }
    .main { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 1px; background: var(--border); }
    .panel { background: var(--surface); padding: 20px; }
    .panel.wide { grid-column: span 2; }
    .panel.full { grid-column: span 3; }
    .panel-title {
      color: var(--muted);
      font-size: 10px;
      letter-spacing: 3px;
      text-transform: uppercase;
      margin-bottom: 16px;
      border-bottom: 1px solid var(--border);
      padding-bottom: 8px;
    }
    .metric-big {
      font-size: 42px;
      font-weight: bold;
      line-height: 1;
      margin-bottom: 4px;
    }
    .metric-label { color: var(--muted); font-size: 11px; }
    .metric-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    .metric-card {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 14px;
    }
    .bar-wrap { margin: 8px 0; }
    .bar-bg {
      background: var(--surface2);
      border-radius: 2px;
      height: 6px;
      overflow: hidden;
      margin-top: 6px;
    }
    .bar-fill {
      height: 100%;
      border-radius: 2px;
      transition: width 1s ease;
    }
    .bar-fill.green { background: var(--accent); }
    .bar-fill.yellow { background: var(--warn); }
    .bar-fill.red { background: var(--danger); }
    .bar-fill.blue { background: var(--info); }
    .process-list { list-style: none; }
    .process-list li {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 7px 0;
      border-bottom: 1px solid var(--border);
      font-size: 12px;
    }
    .process-list li:last-child { border-bottom: none; }
    .badge {
      padding: 2px 8px;
      border-radius: 3px;
      font-size: 10px;
      letter-spacing: 1px;
    }
    .badge.run { background: var(--accent-glow); color: var(--accent); border: 1px solid var(--accent); }
    .badge.idle { background: rgba(125,133,144,0.15); color: var(--muted); border: 1px solid var(--border); }
    .badge.warn { background: rgba(210,153,34,0.15); color: var(--warn); border: 1px solid var(--warn); }
    .log-area {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 12px;
      height: 180px;
      overflow-y: auto;
      font-size: 11px;
      line-height: 1.8;
    }
    .log-line { display: flex; gap: 12px; }
    .log-time { color: var(--muted); flex-shrink: 0; }
    .log-msg.ok { color: var(--accent); }
    .log-msg.warn { color: var(--warn); }
    .log-msg.err { color: var(--danger); }
    .log-msg.info { color: var(--info); }
    .mini-chart {
      display: flex;
      align-items: flex-end;
      gap: 3px;
      height: 50px;
      margin-top: 10px;
    }
    .mini-bar {
      flex: 1;
      background: var(--info);
      opacity: 0.7;
      border-radius: 2px 2px 0 0;
      transition: height 0.5s ease;
    }
    .net-row {
      display: flex;
      justify-content: space-between;
      padding: 5px 0;
      border-bottom: 1px solid var(--border);
      font-size: 12px;
    }
    .net-row:last-child { border-bottom: none; }
    footer {
      background: var(--surface);
      border-top: 1px solid var(--border);
      padding: 10px 24px;
      text-align: center;
      color: var(--muted);
      font-size: 11px;
    }
    .refresh-btn {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--muted);
      padding: 4px 12px;
      border-radius: 4px;
      cursor: pointer;
      font-family: var(--font);
      font-size: 11px;
      transition: all 0.2s;
    }
    .refresh-btn:hover { border-color: var(--accent); color: var(--accent); }
  </style>
</head>
<body>

<header>
  <div class="logo">SYS<span>WATCH</span> <span style="font-size:11px;margin-left:8px;">v1.0.0</span></div>
  <div class="status-bar">
    <span><span class="dot green"></span>All Systems Online</span>
    <span style="color:var(--muted)" id="clock"></span>
    <button class="refresh-btn" onclick="refreshAll()">↻ Refresh</button>
  </div>
</header>

<div class="main">

  <!-- CPU -->
  <div class="panel">
    <div class="panel-title">CPU Usage</div>
    <div id="cpu-val" class="metric-big" style="color:var(--accent)">--</div>
    <div class="metric-label">% utilized</div>
    <div class="bar-wrap">
      <div class="bar-bg"><div class="bar-fill green" id="cpu-bar" style="width:0%"></div></div>
    </div>
    <div class="mini-chart" id="cpu-chart"></div>
  </div>

  <!-- RAM -->
  <div class="panel">
    <div class="panel-title">Memory</div>
    <div id="ram-val" class="metric-big" style="color:var(--info)">--</div>
    <div class="metric-label">GB used / 16 GB total</div>
    <div class="bar-wrap">
      <div class="bar-bg"><div class="bar-fill blue" id="ram-bar" style="width:0%"></div></div>
    </div>
    <div class="mini-chart" id="ram-chart"></div>
  </div>

  <!-- Disk -->
  <div class="panel">
    <div class="panel-title">Disk</div>
    <div id="disk-val" class="metric-big" style="color:var(--warn)">--</div>
    <div class="metric-label">GB used / 512 GB</div>
    <div class="bar-wrap">
      <div class="bar-bg"><div class="bar-fill yellow" id="disk-bar" style="width:0%"></div></div>
    </div>
    <div style="margin-top:10px; color:var(--muted); font-size:11px;" id="disk-info">SSD · NVMe · Read: -- MB/s</div>
  </div>

  <!-- Processes -->
  <div class="panel wide">
    <div class="panel-title">Active Processes</div>
    <ul class="process-list" id="proc-list">
      <li><span>Loading...</span></li>
    </ul>
  </div>

  <!-- Network -->
  <div class="panel">
    <div class="panel-title">Network</div>
    <div id="net-rows"></div>
  </div>

  <!-- Log -->
  <div class="panel full">
    <div class="panel-title">System Log</div>
    <div class="log-area" id="log"></div>
  </div>

</div>

<footer>SysWatch IT Monitor &mdash; Built with vanilla JS &mdash; Daris Vatic 2025</footer>

<script>
const processes = [
  { name: 'nginx.service', cpu: 0.2, mem: 128, status: 'run' },
  { name: 'mariadb.service', cpu: 1.4, mem: 512, status: 'run' },
  { name: 'sshd.service', cpu: 0.0, mem: 8, status: 'idle' },
  { name: 'cron.service', cpu: 0.1, mem: 4, status: 'idle' },
  { name: 'php-fpm.service', cpu: 3.2, mem: 256, status: 'warn' },
  { name: 'fail2ban.service', cpu: 0.0, mem: 12, status: 'run' },
];

const logMessages = [
  ['ok','[nginx] Request handled: 200 OK — /api/v1/status'],
  ['ok','[auth] Login success: admin@localhost'],
  ['warn','[php-fpm] Worker pool nearing limit: 28/32'],
  ['info','[cron] Backup job started: full_backup.sh'],
  ['ok','[mariadb] Query cache hit ratio: 94.2%'],
  ['err','[fail2ban] Blocked IP 45.33.32.156 after 5 failed attempts'],
  ['info','[system] Disk check scheduled: 03:00 UTC'],
  ['ok','[nginx] SSL cert renew success: expires in 89 days'],
  ['warn','[mem] Swap usage approaching 40%'],
  ['ok','[cron] Backup completed: 4.2 GB → /backup/2025-01-15.tar.gz'],
];

const netData = [
  { iface: 'eth0', rx: '12.4 MB/s', tx: '3.1 MB/s', ip: '192.168.1.100' },
  { iface: 'lo', rx: '0.0 MB/s', tx: '0.0 MB/s', ip: '127.0.0.1' },
  { iface: 'docker0', rx: '0.8 MB/s', tx: '0.2 MB/s', ip: '172.17.0.1' },
];

let cpuHistory = Array(20).fill(0);
let ramHistory = Array(20).fill(0);

function rand(min, max) { return Math.random() * (max - min) + min; }

function refreshAll() {
  const cpu = rand(15, 75);
  const ram = rand(4, 12);
  const disk = 287;

  cpuHistory.push(Math.round(cpu));
  cpuHistory.shift();
  ramHistory.push(Math.round((ram/16)*100));
  ramHistory.shift();

  document.getElementById('cpu-val').textContent = Math.round(cpu);
  document.getElementById('cpu-bar').style.width = cpu + '%';
  document.getElementById('cpu-bar').className = 'bar-fill ' + (cpu > 80 ? 'red' : cpu > 60 ? 'yellow' : 'green');

  document.getElementById('ram-val').textContent = ram.toFixed(1);
  document.getElementById('ram-bar').style.width = (ram/16*100) + '%';

  document.getElementById('disk-val').textContent = disk;
  document.getElementById('disk-bar').style.width = (disk/512*100) + '%';
  document.getElementById('disk-info').textContent = 'SSD · NVMe · Read: ' + Math.round(rand(300,550)) + ' MB/s';

  renderChart('cpu-chart', cpuHistory, '#2ea043');
  renderChart('ram-chart', ramHistory, '#1f6feb');
  renderProcesses();
  renderNet();
  addLog();
}

function renderChart(id, data, color) {
  const el = document.getElementById(id);
  el.innerHTML = '';
  const max = Math.max(...data, 1);
  data.forEach(v => {
    const b = document.createElement('div');
    b.className = 'mini-bar';
    b.style.height = Math.max(4, (v/max)*50) + 'px';
    b.style.background = color;
    el.appendChild(b);
  });
}

function renderProcesses() {
  const el = document.getElementById('proc-list');
  el.innerHTML = '';
  processes.forEach(p => {
    const li = document.createElement('li');
    const cpu = (p.cpu + rand(-0.5, 0.5)).toFixed(1);
    li.innerHTML = `
      <span>${p.name}</span>
      <span style="color:var(--muted)">${Math.max(0,cpu)}% CPU · ${p.mem} MB</span>
      <span class="badge ${p.status}">${p.status.toUpperCase()}</span>
    `;
    el.appendChild(li);
  });
}

function renderNet() {
  const el = document.getElementById('net-rows');
  el.innerHTML = netData.map(n => `
    <div class="net-row">
      <span style="color:var(--info)">${n.iface}</span>
      <span>${n.ip}</span>
      <span style="color:var(--accent)">↓${n.rx}</span>
      <span style="color:var(--warn)">↑${n.tx}</span>
    </div>
  `).join('');
}

let logIdx = 0;
function addLog() {
  const el = document.getElementById('log');
  const now = new Date().toLocaleTimeString();
  const [type, msg] = logMessages[logIdx % logMessages.length];
  logIdx++;
  const line = document.createElement('div');
  line.className = 'log-line';
  line.innerHTML = `<span class="log-time">${now}</span><span class="log-msg ${type}">${msg}</span>`;
  el.appendChild(line);
  el.scrollTop = el.scrollHeight;
}

function updateClock() {
  document.getElementById('clock').textContent = new Date().toLocaleTimeString();
}

refreshAll();
updateClock();
setInterval(refreshAll, 3000);
setInterval(updateClock, 1000);
</script>
</body>
</html>
